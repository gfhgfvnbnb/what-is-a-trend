<style>

    justify-content: center;
    font-size: 36px;

    align-items: center;
    justify-content: center;
    opacity: 0;

    font-weight: 700;

    font-weight: 600;

    font-weight: 700;

const videos = [

    title: "What is a trend?",

    readTime: "8 min",
    likes: "47k",
    comments: "1,2k",
    body: `<p>A trend can be multiple things, but here we’ll focus on social media trends. A trend is something that becomes popular during a certain period of time and is followed by a large number of people. Trends can exist in many areas such as fashion, music, technology, or lifestyle. For example, fashion trends often appear in magazines, runway shows, or through celebrities and influencers who influence the way people dress or behave. It bet you've been all influenced by The devil wears Prada 2 ! </p>
    <p>Today, social media plays a major role in the creation and spread of trends. Platforms such as TikTok, Instagram, and X can make a video, a song, a challenge, or even a sentence become viral in only a few hours. Social media trends include dance challenges, memes, viral sounds, beauty routines, fashion aesthetics, or internet slang. Examples include the “clean girl” aesthetic, TikTok dance challenges, AI generated videos, or brain rot content made of repetitive and addictive short videos like the 67 trend.</p>`

  {

    views: "890k",
    pinned: false,
    tags: ["#Fashion", "#Tulip"],
    title: "Were there trends before the internet ? ",
    date: "2 avril 2025",
    readTime: "6 min",
    likes: "23k",
    comments: "654",
    body: `<p>If we are only focusing on the meaning of the word trend applied to the world of social media, its definition can be seen from a much more ancient perspective. The Oxford Language gives us a simple definition, a trend can be explained as “a fashion” which is quite revelatory. The notion of trend, in time, expands to the notion of a movement followed by a large number of persons. We can identify “trends” that mimic the similar schemes that today trends use : a rapid and exponential fame that ultimately results in a rapid abandonment of the given fashion.</p>
    <p>Fashion is extremely visible in the way it evolves from designers' general ideas to the catwalks and in-store sales, which allows us to see the unbelievable power of trends within the industry. A trend evolves as follows: from an individual exploring a new way of dressing, to a social group accepting this way, to the fashion catwalks, and further to brick-and-mortar and online stores as an offer for customers, finally ending up being worn in the streets. </p>
    <p>One famous example of a trend that existed before the internet, and that does not come from the fashion industry, is tulip mania. Tulip Mania (Tulipomania) occurred in Holland during the Dutch Golden Age and has long been considered the first recorded speculative or asset bubble.</p>
    <p>When the tulip was introduced, it immediately became a popular status symbol for the wealthy and the growing middle class. However, the flowers were fragile and it took years for flowers to grow from a seed. After it was discovered that the flower could be grown faster from a bulb, the bulbs became highly coveted. Speculation drove the value of tulip bulbs to extremes, with amounts evaluated to be similar to the price of a house today, and in 1634, tulip mania swept through the country. After a few years the frenzy died down, and by February 1637, prices began to decline. By 1638 prices leveled off. </p>
    <p>Therefore, it is easy to say that trends, from the Tulip Mania in the 17th to the 20th century fashion, have always existed.</p>`
  },

    id: 3,
    emoji: "🧠",
    image : 'images/3.jpeg',
    grad: "grad-4",
    views: "1,2M",
    pinned: false,
    tags: ["#Psycho", "#Social"],
    title: "Why are trends so addictive",
    date: "5 mai 2025",
    readTime: "7 min",
    likes: "34k",
    comments: "987",
    body: `<p>To understand why trends are so addictive, we need to understand human behavior at its core. The reasons why a trend stick might seem random, simple coincidences. In reality, human psychology plays a major part in this understanding. We, humans, are built to connect, to mirror, to belong because we are a social species. Behind every trend lies the concept of social proof, the idea that we look to others to guide our behaviour, especially when we’re unsure. The feeling of having someone to look to to get inspiration is crucial to feel accepted in a community. Therefore, there is a sense of urgency when trends start to appear everywhere, the fear of missing out, because trends exist for such a short period of time that not following them could eventually make you always outside of the group. The feeling of being included can be compared to the dopamine boost that we get when we scroll, we always want more.</p>`

    readTime: "9 min",
    likes: "18k",
    comments: "445",
    body: `<figure style="margin:20px 0;">
              <img src="images/Rise-Fall-of-Trends-1-2-1024x576.png" style="width:100%; border-radius:8px; margin:20px 0;">
              <figcaption style="font-size:12px; color:#888; margin-top:6px; text-align:center;">The modern trend cycle, accelerated by digital culture. Source : ASCJCapstone </figcaption>
          </figure>
    <p>Trends don't last long today because human psychology naturally wants two opposite things at the same time: we want to fit in and belong to a group, but we also want to be unique. When a new trend starts on social media, in fashion, or even in the economy, it feels cool, exclusive, and fresh. However, because of modern algorithms and ultra-fast production cycles, everyone copies it almost instantly. According to data from the United Nations Environment Programme (UNEP), the average consumer today buys 60% more clothes than twenty years ago, but keeps them for only half as long. This proves that the lifecycle of any trend has collapsed. Very quickly, the trend is everywhere, it loses its "cool factor," and people get bored of it. To keep making money and keeping users hooked, companies and social media platforms immediately create the next trend, and the endless cycle starts all over again. </p>`
  },
  {

    title: "Which factors predict the best, the success of a TikTok video ?",

    body: `<h2>Introduction</h2>
    <p>Why certain videos and not others ? A question we all at a given time asked ourselves concerning trends or successful videos in general. So to better understand our subject and see it by our own ways, we decided to analyse raw data which describe a few features of a TikTok. And more particularly which of those features were key predictors of the number of likes on a TikTok video. </p>
    <h2>Data Used</h2>
    <p>The dataset used comes from Kaggle  <a href="https://www.kaggle.com/datasets/erikvdven/tiktok-trending-december-2020" target="_blank">https://www.kaggle.com/datasets/erikvdven/tiktok-trending-december-2020</a> ,it contains a wealth of information on scrapped TikToks : their number of view, as well as the popularity of the song played in it, their publication date. Then a second CSV coming from the same page was used to add specific variables on trendy spotify songs used in TikToks (N = 1000). </p>
    <figure style="margin:20px 0;">
      <img src="images/distrib likes.png" style="width:100%; border-radius:8px; margin:20px 0;">

    <h2>Method for the analysis</h2>
    <p>gWe firstly created 54 new variables. We created 1 new variable which gives the number of emoji in the description. Then 50 others, by onehotencoding the top 50 hashtags. Finally, we created 3 variables based on the variable “album.release_date” giving us the day, month, and years of the release date of an album.</p>
    <p>It should be noted that for this study, we choose not to use the numbers of plays, comments or shares since these variables are known to be very correlated to the number of likes itself. We then standardized the features and separated the data into a training set (75%) and testing set (25%).</p>
    <p>We finally built and evaluated four regression models, using scikit learn python3 library: </p>
    <p> - Linear regression </p>
    <p> - LASSO regression (5-fold cross-validated for 50 fits, 1 / λ ∈ [0.001, 0.005, 0.01, 0.05, 0.1, 0.5, 1, 1.5, 10, 100]).</p>
    <p> - Neural Network (5-fold cross-validated for 720 fits and several hyper-parameters, see Table A1) </p>
    <p> - The same 3 but using a logarithmic distribution of the target variable</p>
    <p> - Random Forest (n_estimator of 100)</p>
    <p>We aim to compare models based on their ability to minimize large prediction errors, we then use the RMSE which penalizes larger deviations. We then look at the top factors predicting the number of likes on TikTok of each model. </p>
    <h2>Results</h2>
    <h3>Model performance</h3>
    <p>The Random Forest achieves the lowest test RMSE, followed by the Neural Network, while Linear and LASSO regressions perform similarly (see Table 1). However, the predictive performance of each model is not the primary focus of this study. In fact, what interests us is identifying which factors are most associated with TikTok success, using model coefficients and feature importances as analytical tools.</p>
    <figure style="margin:20px 0;">
      <img src="images/Capture d’écran 2026-05-20 à 17.59.50 2.png" style="width:100%; border-radius:8px; margin:20px 0;">
      <figcaption style="font-size:12px; color:#888; margin-top:6px; text-align:center;">Table 1 – Summary of train and test RMSE across models.</figcaption>
    </figure>
    <p>The relatively high RMSE values across all models suggest that the number of likes is difficult to predict from the variables alone (not much feature engineering), which is itself informative. It suggests that viral success on TikTok is partly driven by factors not captured in our dataset, such as the creator's follower count or the video's content itself. </p>
    <h3>Key predictors of TikTok success</h3>
    <p>Rather than focusing on predictive accuracy, we use model coefficients and variable importances to understand which characteristics of a TikTok video are most associated with a high number of likes, which in this study is the sign of success.</p>
    <p>From the LASSO regression, the regularization process forces irrelevant coefficients to exactly zero, providing a sparse and interpretable selection of predictors. The non-zero coefficients retained by the model indicate the variables that carry the most predictive signal. </p>
    <p>From the Random Forest, feature importances reveal the variables that most reduce prediction error across all decision trees. The most important predictors are text_length, duration, hour, n_hashtags and day_of_week, suggesting that contextual and formal properties of a video matter more than the musical characteristics of the accompanying track (see Figure 2). We can also note that dimensional variables are present in this top but are not as predictive as other variables. The only information we have on the content creator is its status (verified or not verified) which is given by the variable author_verified is also not to be forgotten being the 6th most predictive of a TikTok success.</p>

      <figcaption style="font-size:12px; color:#888; margin-top:6px; text-align:center;">Figure 2 – Top 15 feature importances from the Random Forest model.</figcaption>
    </figure>
    <p>These results converge to suggest several interpretable patterns :</p>
    <p> - Publication timing (hour, day_of_week) consistently emerges as a significant predictor, consistent with the literature on optimal posting windows for social media engagement.</p>
    <p> - Description length (text_length, n_hashtags) being in the top predictors is a striking finding — it may reflect that creators who invest in crafting longer, more elaborate descriptions tend to be more experienced or strategic creators overall.</p>
    <p> - Video duration (duration) matters significantly, which aligns with TikTok's how algorithm works by favoring videos that maximize watch-through rate.</p>
    <p> - Musical features such as popularity or music_original show comparatively lower importance, suggesting that the choice of soundtrack, still relevant, is secondary to the formal and temporal properties of the post itself.</p>

    <p>This fast-moving cycle has a catastrophic impact on our planet because it directly drives overconsumption. Today, when a trend goes viral on TikTok or Instagram, fast-fashion brands and internet creators rush to produce tons of cheap merchandise, often called "merch," to make money before the hype dies. Social media creates a lot of psychological pressure, making us feel like we need to buy these items immediately just to stay relevant. </p>

    <p>Some companies take advantage of social media trends to sell more products and attract even more customers. Everyone knows Duolingo, right? The brand became extremely popular on apps like TikTok because of its funny and chaotic marketing videos. They don't use traditional advertisements : the green bird follows online trends, memes, and viral music to create content that people want to share. This strategy is often called “trendjacking” or “culture marketing”.</p>
